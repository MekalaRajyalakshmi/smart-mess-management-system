{% extends 'base.html' %}

{% block content %}
<div class="card" style="max-width: 350px; margin: 100px auto; text-align: center; background: white; padding: 20px; border-radius: 8px; border: 1px solid #ddd;">
    <h2>Smart Mess Login</h2>
    <form method="post">
        {% csrf_token %}
        <p>
            <label>Admission No / Employee ID:</label><br>
            <input type="text" name="username" required placeholder="e.g. 21X01A0501 or COOK01" style="width: 90%; padding: 8px; margin-top: 5px;">
        </p>
        <p>
            <label>Password:</label><br>
            <input type="password" name="password" required style="width: 90%; padding: 8px; margin-top: 5px;">
        </p>
        <button type="submit" style="width: 100%; padding: 10px; background-color: #333; color: white; border: none; border-radius: 4px; cursor: pointer;">Login</button>
    </form>
    
    <p style="font-size: 0.8em; color: #666; margin-top: 15px;">
        *Students use Admission Number as ID.
    </p>
    
    <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    
    <p style="font-size: 0.9em;">
        New user? <a href="{% url 'register' %}" style="color: #007bff; text-decoration: none;">Create an account</a>
    </p>
</div>
{% endblock %}
